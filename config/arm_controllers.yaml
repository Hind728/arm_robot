controller_manager:
  ros__parameters:
    update_rate: 100

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
      state_publish_rate: 25
      command_publish_rate: 25

    gripper_controller:
      type: position_controllers/GripperActionController
      joints:
        - gripper_joint
